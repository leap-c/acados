name: Build wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-runtime:
    name: leap-c-acados-runtime ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: macos-latest
            arch: universal
            cibw_archs_macos: "x86_64 arm64"

    env:
      CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs_macos || '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build C libraries
        if: runner.os != 'Linux'
        shell: bash
        run: bash scripts/build_acados_c.sh
        env:
          SOURCE_DIR: ${{ github.workspace }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        with:
          package-dir: packages/leap_c_acados_runtime

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-runtime-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build-acados-noarch:
    name: leap-c-acados noarch wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Python package
        run: bash scripts/sync_template.sh

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel packages/leap_c_acados

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-acados-noarch
          path: packages/leap_c_acados/dist/*.whl
