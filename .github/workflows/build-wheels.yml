name: Build and publish wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-runtime:
    name: acados-runtime ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
            cibw_image: manylinux_2_28
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64
          - os: windows-2022
            arch: AMD64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build C libraries
        shell: bash
        run: bash scripts/build_acados_c.sh
        env:
          SOURCE_DIR: ${{ github.workspace }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        with:
          package-dir: packages/acados_runtime

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-runtime-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

      - name: Publish to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/

  build-acados-noarch:
    name: acados noarch wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Python package
        run: bash scripts/sync_template.sh

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel packages/acados

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-acados-noarch
          path: packages/acados/dist/*.whl

      - name: Publish to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/acados/dist/
