[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "acados-runtime"
version = "0.5.1"
requires-python = ">=3.8"
description = "Pre-compiled C shared libraries and headers for acados"

[tool.setuptools.packages.find]
include = ["acados_runtime*"]

[tool.setuptools.package-data]
acados_runtime = ["lib/**/*", "include/**/*", "bin/**/*"]

[tool.cibuildwheel]
build = "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-*"
skip = "pp* *-musllinux*"
test-command = "python -c 'import acados_runtime; print(\"acados_runtime ok\")'"

[tool.cibuildwheel.linux]
before-build = "bash scripts/build_acados_c.sh"

[tool.cibuildwheel.macos]
before-build = "bash scripts/build_acados_c.sh"

[tool.cibuildwheel.windows]
before-build = "bash scripts/build_acados_c.sh"
